name: Magento 2 Module CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Code Quality & Syntax Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.1'
          tools: composer:v1 # Magento module compatible with composer v1

      - name: Validate composer.json
        run: |
          if [ -f composer.json ]; then
            composer validate
          fi

      - name: PHP Syntax Check (Lint)
        run: |
          find . -type f -name "*.php" -not -path "./vendor/*" -exec php -l {} \; | (! grep -v "No syntax errors detected")

  deploy:
    name: Build & Deploy to Gemfury
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full git history is needed for commit info and git push

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Configure Gemfury Credentials
        run: |
          echo "machine git.fury.io" > ~/.netrc
          echo "  login ${{ secrets.FURY_EMAIL }}" >> ~/.netrc
          echo "  password ${{ secrets.FURY_PASS }}" >> ~/.netrc
          chmod 600 ~/.netrc

      - name: Push to Gemfury
        run: |
          git remote add fury https://git.fury.io/cajedu/custom_module-city.git
          git push fury HEAD:master --force

      - name: Send Notification via Pushover
        run: |
          GIT_COMMITTER_NAME=$(git log -1 --pretty=format:'%an')
          GIT_BRANCH="main"
          GIT_COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          
          PACKAGE_NAME=$(jq -r '.name' composer.json)
          PACKAGE_VERSION=$(jq -r '.version' composer.json)
          
          NOTE_MESSAGE="Please update composer. New commit at [$PACKAGE_NAME@$PACKAGE_VERSION] with message: $GIT_COMMIT_MESSAGE on (${GIT_BRANCH}) by: ($GIT_COMMITTER_NAME)"
          
          curl -s \
            --form-string "token=${{ secrets.PUSHOVER_TOKEN }}" \
            --form-string "user=${{ secrets.PUSHOVER_USER }}" \
            --form-string "message=${NOTE_MESSAGE}" \
            https://api.pushover.net/1/messages.json
